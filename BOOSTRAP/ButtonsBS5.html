<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container mt-3">
        <button type="button" class="btn btn-info bg-dark text-white">This is a button</button>
        <button type="button" class="btn btn-dark bg-danger">This is a button</button>
    </div> <br><br>

    <div>
        <button type="button" class="btn btn-outline-info ">sai halwai</button>
        <button type="button" class="btn btn-outline-dark">dark</button>
        <button type="button" class="btn btn-outline-info">INFO</button>
        <button type="button" class="btn btn-outline-dark text-primary">dark</button>
        <button type="button" class="btn btn-link">sai</button>
    </div> <br><br>

    <div class="container-fluid mt-3 d-grid">
        <button type="button" class="btn btn-primary btn-block">Submit</button>
    </div> <br><br>

    <div class="container-fluid mt-3 btn-outline-dark">
        <button type="button" class="btn spinner-border text-info  disabled"></button>
        <button type="button" class="btn spinner-grow text-danger active"></button>
    </div>
</body>
</html>
