<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ButtonGroup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class=" mt-3 btn-group">
        <button type="button" class="btn btn-primary">Vivo</button>
        <button type="button" class="btn btn-dark">Apple</button>
        <button type="button" class="btn btn-info">Samsung</button>
    </div> <br><br>

    <div class="mt-3 btn-group-vertical">
        <button type="button" class="btn btn-primary">SAi</button>
        <button type="button" class="btn btn-secondary">Vivo</button>
        <button type="button" class="btn btn-danger">Oppo</button>
    </div> <br><br> 

    <div class="mt-3 btn-group ">
        <button type="button" class="btn btn-primary">Button</button>
        <button type="button" class="btn btn-dark">Button</button>
        <button type="button" class="btn btn-dark">Button</button>
    </div> <br><br>

    <div class="mt-3 btn-group" >
        <button type="button" class="btn btn-outline-primary">Button</button>
        <button type="button" class="btn btn-info">Button</button>
        <div class="btn-group">
        <button type="button" class="btn btn-danger dropdown-toggle" data-bs-toggle="dropdown">Vivo</button>
        <div class="dropdown-menu">
            <a class="dropdown-item" href="#">Vivo v15</a>
            <a class="dropdown-item" href="#">Vivo v17</a>
        </div>
        </div>
    </div> <br><br>

    <div class="mt-3 btn-group">
        <button type="button" class="btn btn-primary">Samsung</button>
        <button type="button" class="btn btn-primary">Nokia</button>
        <div class="btn-group">
            <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown">Oppo</button>
            <div class="dropdown-menu">
                <a class="dropdown-item" href="#">Oppo F 17Pro</a>
                <a class="dropdown-item" href="#">Oppo a3s</a>
            </div>
        </div>
    </div> <br><br>

    <div class="btn-group">
        <button type="button" class="btn btn-primary">Vivo</button>
        <button type="button" class="btn btn-primary">Oppo</button>
        <div class="btn-group">
            <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown">Iphone</button>
            <div class="dropdown-menu">
                <a class="dropdown-item" href="#">13Pro max</a>
                <a class="dropdown-item" href="#">14Pro max</a>
            </div>
        </div>
    </div> <br><br>

    <div class="btn-group">
        <button type="button" class="btn btn-outline-primary">Oppo</button>
        <button type="button" class="btn btn-outline-info">Samsung</button>
        <div class="btn-group">
            <button type="button" class="btn btn-outline-primary dropdown-toggle" data-bs-toggle="dropdown">vivo</button>
            <div class="dropdown-menu">
                <a class="dropdown-item" href="#">Vivo v15 pro</>
                <a class="dropdown-item" href="#">vivo a3s</a>
            </div>
        </div>
    </div>
</body>
</html>
